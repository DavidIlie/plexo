# Keep pnpm's supply-chain cooldown (reject deps published <24h ago) for the
# whole tree EXCEPT the Next.js canary packages we intentionally track — those
# are routinely <24h old and would otherwise fail clean-store installs (CI).
# Everything is still pinned by pnpm-lock.yaml.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - next
  - "@next/*"
  - eslint-config-next
